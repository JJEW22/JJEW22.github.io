<table class="table is-striped">
    <tr>
        <th style="color:#000000">Mom</th>
        <th style="color:#9932CC">Jack</th>
        <th style="color:#FFA500">Ryan</th>
        <th style="color:#FF69B4">Abbey</th>
        <th style="color:#eFeF00">Dad</th>
        <th style="color:#00FF00">Green</th>
        <th style="color:#FF0000">Red</th>
        <th style="color:#0000FF">Blue</th>
    </tr>
    <tr *ngFor="let binaryString of binaryStringMatrix;">
       <td *ngFor="let bit of binaryString;">{{bit}}</td>
    </tr>
 </table>
