services:
  svelte-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - type: bind
        source: .
        target: /app
      - /app/node_modules
    env_file:
      - .env                     # <-- ADD: pulls in DATABASE_URL + FOOTBALL_DATA_TOKEN
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0